name: Test and coverage

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Build cache
        uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwayland-dev \
            libxkbcommon-dev \
            libdav1d-dev
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Run tests
        run: cargo test --all-features --verbose
      - name: Generate coverage report (libimgvwr)
        run: |
          cargo llvm-cov --all-features -p libimgvwr --lcov --output-path lcov-libimgvwr.info
      - name: Generate coverage report (imgvwr)
        run: |
          cargo llvm-cov --all-features -p imgvwr --lcov --output-path lcov-imgvwr.info
      - name: Upload libimgvwr coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./lcov-libimgvwr.info
          flags: libimgvwr
          name: libimgvwr
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload imgvwr coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./lcov-imgvwr.info
          flags: imgvwr
          name: imgvwr
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
